services:

  redis:
    image: redis:8-alpine
    container_name: notes_redis
    ports:
      - "6379:6379"

  backend:
    build: ./notesapp
    container_name: notes_backend
    volumes:
      - static_data:/app/staticfiles
    expose:
      - "8000"
    env_file:
      - .env.production
    depends_on:
      - redis
  

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: notes_nginx
    ports:
      - "80:80"
    volumes:
      - static_data:/static
    depends_on:
      - backend

volumes:
  static_data: